<!DOCTYPE html>
<html lang="pt-br" layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Adolescentes</title>
</head>

<body>
<div layout:fragment="content">
    
    
    <div class="container-fluid p-2">
        <div class="row">
            <div class="col-12">
                <nav aria-label="breadcrumb card"
                     style="margin-top: -25px; font-size: 0.8rem;">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item">
                            <a th:href="@{/home}">
                                <i class="fa-duotone fa-solid fa-house fs-7"></i> Home
                            </a>
                        </li>
                        <li class="breadcrumb-item"><span class="text-muted">
									<i class="fa-duotone fa-solid fa-building-lock"></i>
									Internações
							</span></li>
                    
                    </ol>
                </nav>
            </div>
            <div class="col-12">
                <!-- Mensagens de erro e de ok -->
                <div class="alert alert-success alert-dismissible fade show auto-close"
                     id="successAlert"
                     role="alert" th:if="${msgOk}">
                    <i class="fa-duotone fa-solid fa-thumbs-up me-2"></i> <span
                        th:text="${msgOk}"></span>
                    <button aria-label="Close" class="btn-close" data-bs-dismiss="alert"
                            type="button"></button>
                </div>
                
                <!-- Mensagem de Erro -->
                <div class="alert alert-danger alert-dismissible fade show auto-close"
                     id="errorAlert"
                     role="alert" th:if="${msgErro}">
                    <i class="fa-duotone fa-solid fa-triangle-exclamation me-2"></i> <span
                        th:text="${msgErro}"></span>
                    <button aria-label="Close" class="btn-close" data-bs-dismiss="alert"
                            type="button"></button>
                </div>
            </div>
            <div class="col-12" style="margin-top: -15px;">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center fs-6 fw-semibold text-uppercase">
                        
                        <h6 class="mb-0 text-secondary">Internações</h6>
                        
                        <a class="btn btn-outline-sistema"
                           data-bs-toggle="tooltip" th:href="@{'/internacoes/novo?' + ${queryParams}}"
                           title="Novo Adolescente"> <i class="fa-duotone fa-plus"></i>
                            Novo
                        </a>
                        
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-12">
                                <form class="mb-3" method="get" th:action="@{/internacoes}">
                                    <input name="unidadeId" th:value="${unidadeId}" type="hidden">
                                    <div class="row g-2">
                                            <div class="col-md-3 input-group-sm">
                                                <label class="form-label fw-semibold">Nome do
                                                    Adolescente</label>
                                                <input class="form-control" name="nomeAdolescente"
                                                                               placeholder="Digite para buscar"
                                                                               th:value="${filtro.nomeAdolescente}"
                                                                               type="text">
                                            </div>
                                        
                                        <div class="col-md-3 input-group-sm">
                                            <label class="form-label fw-semibold">Cidade do
                                                Adolescente</label> <input class="form-control" name="cidadeAdolescente"
                                                                           placeholder="Digite para buscar"
                                                                           th:value="${filtro.cidadeAdolescente}"
                                                                           type="text">
                                        </div>
                                        <div class="col-md-2 input-group-sm">
                                            <label class="form-label fw-semibold">Status</label>
                                                    <select  class="form-select" name="filtroStatus">
                                                    <option th:selected="${filtro.filtroStatus == 'ATIVA'}"
                                                            value="ATIVA">Ativas
                                                    </option>
                                                    <option th:selected="${filtro.filtroStatus == 'FINALIZADA'}"
                                                            value="FINALIZADA">Finalizadas
                                                    </option>
                                                    <option th:selected="${filtro.filtroStatus == 'CANCELADA'}"
                                                            value="CANCELADA">Canceladas
                                                    </option>
                                                        <option th:selected="${filtro.filtroStatus == 'TRANSFERIDA'}"
                                                                value="TRANSFERIDA">Transferidas
                                                        </option>
                                                        <option th:selected="${filtro.filtroStatus == 'TODAS'}"
                                                                value="TODAS">Todas
                                                        </option>
                                                </select>
                                        </div>
                                        <div class="col-md-1 input-group-sm">
                                            <label class="form-label fw-semibold">Linhas</label> <select
                                                class="form-select" name="size">
                                            <option th:selected="${filtro.size == 10}" value="10">10</option>
                                            <option th:selected="${filtro.size == 15}" value="15">15</option>
                                            <option th:selected="${filtro.size == 20}" value="20">20</option>
                                            <option th:selected="${filtro.size == 25}" value="25">25</option>
                                            <option th:selected="${filtro.size == 30}" value="30">30</option>
                                        </select>
                                        </div>
                                        <div class="col-md-2 input-group-sm" th:if="${isMaster}">
                                            <label class="form-label fw-semibold">Unidade</label> <select
                                                class="form-select" name="filtroUnidadeId">
                                            <option value="">Todas</option>
                                            
                                            <option th:each="u : ${unidades}"
                                                    th:selected="${u.id == filtro.filtroUnidadeId}"
                                                    th:text="${u.nome}"
                                                    th:value="${u.id}">
                                            </option>
                                        </select>
                                        </div>
                                        <div class="col-md-2 input-group-sm" th:if="${!isMaster}">
                                            <label class="form-label fw-semibold">Unidade</label> <input
                                                class="form-control" disabled
                                                th:value="${lotacaoUsuarioLogado.unidade.nome}" type="text">
                                        </div>
                                        <div class="col-md-1 d-flex align-items-end input-group-sm">
                                            <div
                                                    th:replace="fragments/botoesBusca :: btnBuscar('Aplicar Filtros')"></div>
                                        </div>
                                    </div>
                                    
                                    <div class="row g-2 mt-1">
                                        
                                     
                                    
                                        
                                    
                                    
                                    </div>
                                </form>
                            
                            
                            </div>
                            <div class="col-12">
                                <div class="d-none d-md-block">
                                    <table class="table table-striped table-bordered align-middle">
                                        <thead class="table-dark"
                                               style="--bs-table-bg: #0c174a; --bs-table-border-color: #0e2583;">
                                        <tr>
                                            <th class="text-center" style="width: 10%;">Foto</th>
                                            <th>Dados</th>
                                            <th>Unidade Cadastro</th>
                                            <th>Unidade Internação</th>
                                            <th>Status da Internação</th>
                                            <th>Início</th>
                                            <th>Fim(provável)</th>
                                            <th class="text-center" style="width: 140px;">Ações</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="internacao : ${lista}">
                                            
                                            <td class="text-center" style="width: 10%;"><img
                                                    class="foto-tabela"
                                                    th:if="${internacao.fotoAdolescente != null}"
                                                    th:src="${internacao.fotoAdolescente}">
                                                <img class="foto-tabela"
                                                     src="/img/sem-foto.png"
                                                     th:if="${internacao.fotoAdolescente == null}"></td>
                                            
                                            
                                            <td>
                                                <div class="fw-semibold"
                                                     th:text="${internacao.nomeAdolescente}"></div>
                                                <small
                                                        class="text-muted d-block"> Natural: <span
                                                        th:text="${internacao.cidadeAdolescente}"></span> / <span
                                                        th:text="${internacao.ufAdolescente}"></span> • <span
                                                        th:text="${internacao.idadeAdolescente}"></span> anos
                                                </small> <small class="text-muted d-block"> Mãe: <span
                                                    th:text="${internacao.maeDoAdolescente}"></span>
                                            </small>
                                            </td>
                                            
                                            <td th:text="${internacao.nomeUnidadeCadastro}"></td>
                                            <td th:text="${internacao.nomeUnidadeInternacao}"></td>
                                            
                                            
                                            <td class="text-center">
                                                
                                                <div th:switch="${internacao.status.name()}">

        <span class="badge bg-success-subtle text-success fs-6 fw-semibold px-3 py-2"
              th:case="'ATIVA'"
              th:text="${internacao.status.getDescricao()}">
        </span>
                                                    
                                                    <span class="badge bg-secondary-subtle text-secondary fw-semibold fs-6 px-3 py-2"
                                                          th:case="'FINALIZADA'"
                                                          th:text="${internacao.status.getDescricao()}">
        </span>
                                                    
                                                    <span class="badge bg-danger-subtle text-danger fw-semibold fs-6 px-3 py-2"
                                                          th:case="'CANCELADA'"
                                                          th:text="${internacao.status.getDescricao()}">
        </span>
                                                    
                                                    <span class="badge bg-warning-subtle text-warning fw-semibold fs-6 px-3 py-2"
                                                          th:case="*"
                                                          th:text="${internacao.status.getDescricao()}">
        </span>
                                                
                                                </div>
                                            
                                            </td>
                                            
                                            
                                            <td
                                                    th:text="${#temporals.format(internacao.dataInicio, 'dd/MM/yyyy')}"></td>
                                            <td
                                                    th:text="${internacao.dataPrevisaoSaida != null ? #temporals.format(internacao.dataPrevisaoSaida, 'dd/MM/yyyy') : '-'}"></td>
                                            
                                            <td class="text-center text-nowrap">
                                                <a
                                                        class="btn btn-outline-sistema btn-sm px-2"
                                                        data-bs-toggle="tooltip"
                                                        th:href="@{'/internacoes/detalhes/' + ${internacao.id} + '?'+ ${queryParams}}"
                                                        title="Detalhes"> <i
                                                        class="fa-duotone fa-eye"></i>
                                                </a>
                                                
                                                <a
                                                        class="btn btn-outline-sistema btn-sm px-2"
                                                        data-bs-toggle="tooltip"
                                                        th:classappend="${!isMaster ? ' disabled opacity-50' : ''}"
                                                        th:href="${isMaster}
        ? '/internacoes/editar/' + internacao.id + '?' + queryParams
        : '#'"
                                                        title="Editar">
                                                    
                                                    <i class="fa-duotone fa-pen-to-square"></i>
                                                </a>
                                                
                                                
                                                <a class="btn btn-outline-sistema btn-sm px-2"
                                                   data-bs-toggle="tooltip"
                                                   onclick="return confirm('Deseja excluir essa Função?');"
                                                   th:classappend="${!isMaster} ? ' disabled opacity-50' : ''"
                                                   th:href="${isMaster}
        ? '/internacoes/excluir/' + internacao.id + '?' + queryParams
        : '#'"
                                                   title="Excluir">
                                                    
                                                    <i class="fa-duotone fa-trash"></i>
                                                </a></td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                                <div class="d-block d-md-none">
                                    
                                    <div class="card mb-3 shadow-sm"
                                         th:each="internacao : ${lista}">
                                        
                                        <div class="card-body">
                                            
                                            <div class="d-flex gap-3">
                                                
                                                <!-- FOTO -->
                                                <img class="foto-card-mobile"
                                                     th:if="${internacao.fotoAdolescente != null}"
                                                     th:src="${internacao.fotoAdolescente}"> <img
                                                    class="foto-card-mobile"
                                                    src="/img/sem-foto.png"
                                                    th:if="${internacao.fotoAdolescente == null}">
                                                
                                                <!-- DADOS -->
                                                <div class="flex-grow-1">
                                                    
                                                    <!-- NOME -->
                                                    <div class="fw-bold">
                                                        <span th:text="${internacao.nomeAdolescente}"></span>
                                                    </div>
                                                    
                                                    <!-- INFO BASICA -->
                                                    <small class="text-muted d-block"> <span
                                                            th:text="${internacao.idadeAdolescente}"></span> anos •
                                                        <span
                                                                th:text="${internacao.cidadeAdolescente}"></span> /
                                                        <span
                                                                th:text="${internacao.ufAdolescente}"></span>
                                                    </small>
                                                    
                                                    <!-- MAE -->
                                                    <small class="text-muted d-block"> Mãe: <span
                                                            th:text="${internacao.maeDoAdolescente}"></span>
                                                    </small>
                                                    
                                                    <!-- UNIDADES -->
                                                    <small class="text-muted d-block"> Cadastro: <span
                                                            th:text="${internacao.nomeUnidadeCadastro}"></span>
                                                    </small> <small class="text-muted d-block"> Internação: <span
                                                        th:text="${internacao.nomeUnidadeInternacao}"></span>
                                                </small>
                                                    
                                                    <!-- DATAS -->
                                                    <small class="text-muted d-block"> Início: <span
                                                            th:text="${#temporals.format(internacao.dataInicio, 'dd/MM/yyyy')}"></span>
                                                        • Fim: <span
                                                                th:text="${internacao.dataPrevisaoSaida != null ? #temporals.format(internacao.dataPrevisaoSaida, 'dd/MM/yyyy') : '-'}"></span>
                                                    </small>
                                                    
                                                    <!-- STATUS -->
                                                    <div class="mt-2">
    <span class="badge fw-semibold"
          th:classappend="${internacao.status.name() == 'ATIVA' ? ' bg-success-subtle text-success' :
                           internacao.status.name() == 'FINALIZADA' ? ' bg-secondary-subtle text-secondary' :
                           internacao.status.name() == 'CANCELADA' ? ' bg-danger-subtle text-danger' :
                           ' bg-warning-subtle text-warning'}"
          th:text="${internacao.status.descricao}">
    </span>
                                                    </div>
                                                
                                                </div>
                                            
                                            </div>
                                            
                                            <!-- AÇÕES -->
                                            <div class="d-flex justify-content-end gap-2 mt-3">
                                                
                                                <a
                                                        class="btn btn-outline-sistema btn-sm"
                                                        data-bs-toggle="tooltip"
                                                        th:href="@{'/internacoes/detalhes/' + ${internacao.id} + '?'+ ${queryParams}}"
                                                        title="Detalhes"> <i
                                                        class="fa-duotone fa-eye"></i>
                                                </a> <a
                                                    class="btn btn-outline-sistema btn-sm"
                                                    data-bs-toggle="tooltip"
                                                    th:classappend="${!isMaster ? ' disabled opacity-50' : ''}"
                                                    th:href="${isMaster
        ? '/internacoes/editar/' + internacao.id + '?' + queryParams
        : '#'}"
                                                    title="Editar">
                                                
                                                <i class="fa-duotone fa-pen-to-square"></i>
                                            </a>
                                                
                                                <a
                                                        class="btn btn-outline-sistema btn-sm"
                                                        data-bs-toggle="tooltip"
                                                        onclick="return confirm('Deseja excluir essa internação?');"
                                                        th:classappend="${!isMaster ? ' disabled opacity-50' : ''}"
                                                        th:href="${isMaster
        ? '/internacoes/excluir/' + internacao.id + '?' + queryParams
        : '#'}"
                                                        title="Excluir">
                                                    
                                                    <i class="fa-duotone fa-trash"></i>
                                                </a>
                                            
                                            </div>
                                        
                                        </div>
                                    
                                    </div>
                                
                                </div>
                            
                            
                            </div>
                        </div>
                    
                    </div>
                    <div class="card-footer d-flex justify-content-end">
                        
                        <nav aria-label="Paginação">
                            <ul class="pagination mb-0">
                                
                                <!-- Anterior -->
                                <li class="page-item"
                                    th:classappend="${pagina.first} ? 'disabled'">
                                    
                                    <a class="page-link"
                                       th:href="@{'/internacoes?' + ${@urlUtils.internacaoQuery(filtro, pagina.number - 1)}}">
                                        Anterior
                                    </a>
                                </li>
                                
                                <!-- Números -->
                                <li class="page-item"
                                    th:classappend="${i == pagina.number} ? 'active'"
                                    th:each="i : ${#numbers.sequence(0, pagina.totalPages - 1)}">
                                    
                                    <a class="page-link"
                                       th:href="@{'/internacoes?' + ${@urlUtils.internacaoQuery(filtro, i)}}"
                                       th:text="${i + 1}">
                                    </a>
                                </li>
                                
                                <!-- Próxima -->
                                <li class="page-item"
                                    th:classappend="${pagina.last} ? 'disabled'">
                                    
                                    <a class="page-link"
                                       th:href="@{'/internacoes?' + ${@urlUtils.internacaoQuery(filtro, pagina.number + 1)}}">
                                        Próxima
                                    </a>
                                </li>
                            
                            </ul>
                        </nav>
                    
                    </div>
                
                </div>
            </div>
        
        </div>
    
    </div>

</div>


</body>
</html>
