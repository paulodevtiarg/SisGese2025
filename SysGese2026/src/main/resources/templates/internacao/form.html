<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/base}">

<head>
<title>Adolescente</title>
<!-- Este será substituído -->

</head>

<body>
	<div layout:fragment="content">

		<div class="container-fluid p-2">
			<div class="row">
				<div class="col-12">
					<nav aria-label="breadcrumb card"
						style="margin-top: -25px; font-size: 0.8rem;">
						<ol class="breadcrumb">
							<li class="breadcrumb-item"><a th:href="@{/home}"> <i
									class="fa-duotone fa-solid fa-house fs-7"></i> Home
							</a></li>
                            <li class="breadcrumb-item">
                                <a th:href="${queryParams != null and queryParams != ''}
                    ? '/internacoes?' + queryParams
                    : '/internacoes'">
                                    <i class="fa-duotone fa-solid fa-building-lock fs-7"></i>
                                    Internações
                                </a>
                            </li>
							<li class="breadcrumb-item"><span class="text-muted"><i
									class="fa-duotone fa-user-plus"></i> Novo Registro </span></li>


						</ol>
					</nav>
				</div>
				<div class="col-12">
					<!-- Mensagens de erro e de ok -->
					<div th:if="${msgOk}"
						class="alert alert-success alert-dismissible fade show"
						role="alert" id="successAlert">
						<i class="fa-duotone fa-solid fa-thumbs-up me-2"></i> <span
							th:text="${msgOk}"></span>
						<button type="button" class="btn-close" data-bs-dismiss="alert"
							aria-label="Close"></button>
					</div>

					<!-- Mensagem de Erro -->
					<div th:if="${msgErro}"
						class="alert alert-danger alert-dismissible fade show"
						role="alert" id="errorAlert">
						<i class="fa-duotone fa-solid fa-triangle-exclamation me-2"></i> <span
							th:text="${msgErro}"></span>
						<button type="button" class="btn-close" data-bs-dismiss="alert"
							aria-label="Close"></button>
					</div>
				</div>
				<div class="col-12">

					<form th:action="@{/internacoes/salvar}"
						th:object="${internacao}" method="post"
						enctype="multipart/form-data">
						
						<div class="card">

							<div class="card-header d-flex justify-content-between align-items-center fs-4 pr-custom-text fw-semibold text-uppercase">

								<h5 class="mb-0 text-secondary">Novo Registro</h5>

								<div class="d-flex gap-2">
                                    <a  th:href="${queryParams != null and queryParams != ''}  ? '/internacoes?' + queryParams  : '/internacoes'" class="btn btn-outline-danger">
                                        <i class="fa-duotone fa-solid fa-ban"></i> Cancelar
                                    
                                    </a>

									<button type="submit" class="btn btn-outline-sistema">
										<i class="fa-duotone fa-solid fa-floppy-disk"></i> SALVAR
									</button>
								</div>

							</div>


							<div class="card-body">
							
							<div class="row">
                                <div class="col-md-6 input-group-sm">
                                    <label class="form-label fw-semibold">Adolescente para Internação</label>
                                        <select id="adolescenteSelect" class="form-select"
                                                th:field="*{idAdolescente}">
                                            <option value="">Selecione</option>
                                            <option th:each="adol : ${adolescentesElegiveis}"
                                                    th:value="${adol.id}"
                                                    th:text="${adol.nome}">
                                            </option>
                                        </select>
                                        
                                    </div>
                                
                                
                            </div>
                           <div class="row">
                               <div id="cardAdolescente"
                                    class="card mt-3 d-none">
                                   
                                   <div class="card-body">
                                       
                                       <div class="row">
                                           <div class="col-md-2 d-flex ">
                                               <div class="foto-3x4-container-dt mb-2 w-100 h-100">
                                                   <div  class="foto-wrapper-dt">
                                                       <img id="fotoAdolescente"  class="foto-3x4-img-dt" alt="Foto do Adolescente">
                                                   </div>
                                                   
                                               </div>
                                               
                                           </div>
                                           <div class="col-md-10">
                                               <div class="row">
                                                   <div class="col-md-6 mb-2">
                                                       <div class="input-group">
                                                           <span class="input-group-text label-fixa">Nome</span>
                                                           <input  id="nomeAdolescente" type="text" class="form-control fw-bolder fs-6"  disabled>
                                                       </div>
                                                   </div>
                                                   <div class="col-md-2 mb-2">
                                                       <div class="input-group">
                                                           <span class="input-group-text label-fixa">Idade</span>
                                                           <input  id="idadeAdolescente" type="text" class="form-control fw-bolder fs-6"  disabled>
                                                       </div>
                                                   
                                                   </div>
                                                   <div class="col-md-4 mb-2">
                                                       <div class="input-group">
                                                           <span class="input-group-text label-fixa">Cidade</span>
                                                           <input  id="cidadeAdolescente" type="text" class="form-control fw-bolder fs-6"  disabled>
                                                       </div>
                                                   
                                                   </div>
                                               </div>
                                               
                                               <div class="row">
                                                   <div class="col-md-12 mb-2">
                                                       <div class="input-group">
                                                           <span class="input-group-text label-fixa">Mãe</span>
                                                           <input  id="maeAdolescente" type="text" class="form-control fw-bolder fs-6"  disabled>
                                                       </div>
                                                   
                                                   </div>
                                               </div>
                                               <div class="row">
                                                   <div class="col-md-3 mb-2">
                                                       <!-- envia valor quando select estiver disabled -->
                                                       <input type="hidden"
                                                              th:if="${!usuarioMaster}"
                                                              th:field="*{idUnidade}"/>
                                                       <label   class="form-label fw-semibold text-secondary">  Unidade para Internação * </label>
                                                       <select class="form-select"
                                                               th:field="*{idUnidade}"   th:classappend="${#fields.hasErrors('idUnidade')} ? 'is-invalid' : ''"
                                                               th:disabled="${!usuarioMaster}">
                                                       
                                                       <option value="">Selecione</option>
                                                           
                                                           <option th:each="u : ${unidades}"
                                                                   th:value="${u.id}"
                                                                   th:text="${u.nome}">
                                                           </option>
                                                   
                                                       </select>
                                                       
                                                            <div class="invalid-feedback d-block"
                                                            style="min-height: 20px;"
                                                            th:if="${#fields.hasErrors('idUnidade')}"
                                                            th:errors="*{idUnidade}">
                                                            
                                                            </div>
                                                   </div>
                                                   
                                                   <div class="col-md-3 mb-2">
                                                       <label for="tipoMedida"
                                                              class="form-label fw-semibold text-secondary">
                                                           Tipo de Medida * </label>
                                                       <select class="form-select" th:field="*{tipoMedida}" id="tipoMedida"
                                                                                       th:classappend="${#fields.hasErrors('tipoMedida')} ? 'is-invalid' : ''">
                                                                 <option value="">Selecione</option>
                                                                 <option th:each="g : ${tipoMedidas}" th:value="${g}"th:text="${g.descricao}"></option>
                                                   
                                                        </select>
                                                       
                                                       <div class="invalid-feedback d-block"
                                                            style="min-height: 20px;"
                                                            th:if="${#fields.hasErrors('tipoMedida')}"
                                                            th:errors="*{tipoMedida}"></div>
                                                   </div>
                                                   
                                                   <div class="col-md-6 mb-2">
                                                       <label for="docApresentado"
                                                              class="form-label fw-semibold text-secondary">
                                                           Doc. Apresentado  * </label>
                                                       <select class="form-select" th:field="*{docApresentado}" id="docApresentado"
                                                               th:classappend="${#fields.hasErrors('docApresentado')} ? 'is-invalid' : ''">
                                                           
                                                           <option value="">Selecione</option>
                                                           
                                                           <option th:each="g : ${documentosApresentado}" th:value="${g}"
                                                                   th:text="${g.descricao}"></option>
                                                       
                                                       </select>
                                                       
                                                       <div class="invalid-feedback d-block"
                                                            style="min-height: 20px;"
                                                            th:if="${#fields.hasErrors('docApresentado')}"
                                                            th:errors="*{docApresentado}"></div>
                                                   </div>
                                                   
                                                   
                                               </div>
                                               
                                               <div class="row">
                                                   <div class="col-md-6 mb-2">
                                                       <label class="form-label fw-semibold text-secondary">
                                                           Nº Doc. Apresentado * </label>
                                                       <input type="text" th:field="*{numeroProcesso}" id="numeroProcesso"
                                                                               placeholder="Digite o Número do Documento/Processo"
                                                                               class="form-control" th:classappend="${#fields.hasErrors('numeroProcesso')} ? 'is-invalid' : ''">
                                                       <div class="invalid-feedback d-block"
                                                            style="min-height: 20px;"
                                                            th:if="${#fields.hasErrors('numeroProcesso')}"
                                                            th:errors="*{numeroProcesso}"></div>
                                                   </div>
                                                   
                                                   <div class="col-md-3 mb-2">
                                                           <label class="form-label text-muted fw-medium">Data da Apreesão </label>
                                                           
                                                           <div class="d-flex align-items-center gap-2">
                                                                <div class="input-group input-group shadow">
																		<span class="input-group-text bg-white">
                                                                            <i class="fa-duotone fa-calendar-days text-secondary"></i>
																		</span>
                                                                    <input type="date" th:field="*{dataAprensao}" class="form-control">
                                                               </div>
                                                               
                                                           </div>
                                                           
                                                   </div>
                                                   
                                                   <div class="col-md-3 mb-2">
                                                      
                                                           <label for="docApresentado"
                                                                  class="form-label fw-semibold text-secondary">Motivo * </label>
                                                           <select class="form-select" th:field="*{motivo}" id="motivo"
                                                                   th:classappend="${#fields.hasErrors('motivo')} ? 'is-invalid' : ''">
                                                               
                                                               <option value="">Selecione</option>
                                                               
                                                               <option th:each="g : ${motivos}" th:value="${g}"
                                                                       th:text="${g.descricao}"></option>
                                                           
                                                           </select>
                                                           
                                                           <div class="invalid-feedback d-block"
                                                                style="min-height: 20px;"
                                                                th:if="${#fields.hasErrors('motivo')}"
                                                                th:errors="*{motivo}"></div>
                                                       </div>
                                                  
                                                   
                                                   
                                               </div>
                                               
                                               <div class="row">
                                                   <div class="col-md-3 mb-2">
                                                       <label class="form-label text-muted fw-medium">Inicio da Medida *</label>
                                                       
                                                       <div class="d-flex align-items-center gap-2">
                                                           <div class="input-group input-group shadow">
																		<span class="input-group-text bg-white">
                                                                            <i class="fa-duotone fa-calendar-days text-secondary"></i>
																		</span>
                                                               <input type="date" th:field="*{dataInicio}" class="form-control" th:classappend="${#fields.hasErrors('numeroProcesso')} ? 'is-invalid' : ''">
                                                               <div class="invalid-feedback d-block"
                                                                    style="min-height: 20px;"
                                                                    th:if="${#fields.hasErrors('dataInicio')}"
                                                                    th:errors="*{dataInicio}"></div>
                                                           </div>
                                                       
                                                       </div>
                                                   
                                                   </div>
                                               </div>
                                              
                                           </div>
                                           
                                       </div>
                                       
                                   
                                   </div>
                               
                               </div>
                           
                           
                           </div>
                           


							</div>


						</div>

						<div
							class="card-footer d-flex justify-content-end align-items-center">
							<h6>Digite todos os campos. Campos com (*) são obrigatórios.</h6>

						</div>
					</form>
				</div>
				<!-- fim do card -->




			</div>

		</div>
		<!-- FIM DO CARD -->
        <script>
            
            document.addEventListener("DOMContentLoaded", function () {
                
                const select = document.getElementById('adolescenteSelect');
                
                if (!select) return;
                
                select.addEventListener('change', async function () {
                    
                    try {
                        
                        const id = this.value;
                        
                        if (!id) return;
                        
                        // 🔥 MOSTRA LOADING
                        mostrarLoading();
                        
                        console.log("Selecionado:", id);
                        
                        const response = await fetch('/adolescentes/buscaAdolescente/' + id);
                        
                        if (!response.ok) {
                            throw new Error("Erro ao buscar adolescente");
                        }
                        
                        const adolescente = await response.json();
                        
                        console.log(adolescente);
                        
                        const card = document.getElementById('cardAdolescente');
                        
                        if (card) {
                            card.classList.remove('d-none');
                        }
                        
                        const nome = document.getElementById('nomeAdolescente');
                        if (nome) nome.value = adolescente.nome || '-';
                        
                        const idade = document.getElementById('idadeAdolescente');
                        if (idade) idade.value = adolescente.idade || '-';
                        
                        const mae = document.getElementById('maeAdolescente');
                        if (mae) mae.value = adolescente.mae || '-';
                        
                        const cidade = document.getElementById('cidadeAdolescente');
                        
                        if (cidade) {
                            cidade.value =
                                    (adolescente.cidadeNascimento || '-') +
                                    '/' +
                                    (adolescente.ufNascimento || '-');
                        }
                        
                        const foto = document.getElementById('fotoAdolescente');
                        
                        if (foto) {
                            foto.src = adolescente.fotoRegistro || '/img/sem-foto.png';
                        }
                        
                    } catch (e) {
                        
                        console.error(e);
                        
                    } finally {
                        
                        // 🔥 ESCONDE LOADING
                        const overlay = document.getElementById("loadingOverlay");
                        
                        if (overlay) {
                            overlay.style.display = "none";
                        }
                        
                    }
                    
                });
                
            });
        
        </script>
	</div>
 
</body>
</html>
