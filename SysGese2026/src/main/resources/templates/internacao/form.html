<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/base}">

<head>
<title>Adolescente</title>
<!-- Este será substituído -->

</head>

<body>
	<div layout:fragment="content">

		<div class="container-fluid p-2">
			<div class="row">
				<div class="col-12">
					<nav aria-label="breadcrumb card"
						style="margin-top: -25px; font-size: 0.8rem;">
						<ol class="breadcrumb">
							<li class="breadcrumb-item"><a th:href="@{/home}"> <i
									class="fa-duotone fa-solid fa-house fs-7"></i> Home
							</a></li>
                            <li class="breadcrumb-item">
                                <a th:href="${queryParams != null and queryParams != ''}
                    ? '/internacoes?' + queryParams
                    : '/internacoes'">
                                    <i class="fa-duotone fa-solid fa-building-lock fs-7"></i>
                                    Internações
                                </a>
                            </li>
							<li class="breadcrumb-item"><span class="text-muted"><i
									class="fa-duotone fa-user-plus"></i> Novo Registro </span></li>


						</ol>
					</nav>
				</div>
				<div class="col-12">
					<!-- Mensagens de erro e de ok -->
					<div th:if="${msgOk}"
						class="alert alert-success alert-dismissible fade show"
						role="alert" id="successAlert">
						<i class="fa-duotone fa-solid fa-thumbs-up me-2"></i> <span
							th:text="${msgOk}"></span>
						<button type="button" class="btn-close" data-bs-dismiss="alert"
							aria-label="Close"></button>
					</div>

					<!-- Mensagem de Erro -->
					<div th:if="${msgErro}"
						class="alert alert-danger alert-dismissible fade show"
						role="alert" id="errorAlert">
						<i class="fa-duotone fa-solid fa-triangle-exclamation me-2"></i> <span
							th:text="${msgErro}"></span>
						<button type="button" class="btn-close" data-bs-dismiss="alert"
							aria-label="Close"></button>
					</div>
				</div>
				<div class="col-12">

					<form th:action="@{/internacoes/salvar}"
						th:object="${internacao}" method="post"
						enctype="multipart/form-data">
						
						<div class="card">

							<div class="card-header d-flex justify-content-between align-items-center fs-4 pr-custom-text fw-semibold text-uppercase">

								<h5 class="mb-0 text-secondary">Novo Registro</h5>

								<div class="d-flex gap-2">
                                    <a  th:href="${queryParams != null and queryParams != ''}  ? '/internacoes?' + queryParams  : '/internacoes'" class="btn btn-outline-danger">
                                        <i class="fa-duotone fa-solid fa-ban"></i> Cancelar
                                    
                                    </a>

									<button type="submit" class="btn btn-outline-sistema">
										<i class="fa-duotone fa-solid fa-floppy-disk"></i> SALVAR
									</button>
								</div>

							</div>


							<div class="card-body">
							
							<div class="row">
                                <div class="col-md-6 input-group-sm">
                                    <label class="form-label fw-semibold">Adolescente para Internação</label>
                                        <select id="adolescenteSelect" class="form-select"
                                                th:field="*{idAdolescente}">
                                            <option value="">Selecione</option>
                                            <option th:each="adol : ${adolescentesElegiveis}"
                                                    th:value="${adol.id}"
                                                    th:text="${adol.nome}">
                                            </option>
                                        </select>
                                        
                                    </div>
                                
                                
                            </div>
                           <div class="row">
                               <div id="cardAdolescente"
                                    class="card mt-3 d-none">
                                   
                                   <div class="card-body">
                                       
                                       <div class="row">
                                           
                                           <div class="col-md-3">
                                                   
                                                   <img id="fotoAdolescente"
                                                        class="img-fluid rounded foto-adolescente-card">
                                                        
                                              
                                           
                                           </div>
                                           
                                           <div class="col-md-9">
                                               
                                               <h5 id="nomeAdolescente"></h5>
                                               
                                               <p>
                                                   Idade:
                                                   <span id="idadeAdolescente"></span>
                                               </p>
                                               
                                               <p>
                                                   Mãe:
                                                   <span id="maeAdolescente"></span>
                                               </p>
                                               
                                               <p>
                                                   Cidade:
                                                   <span id="cidadeAdolescente"></span>
                                               </p>
                                           
                                           </div>
                                       
                                       </div>
                                   
                                   </div>
                               
                               </div>
                           
                           
                           </div>
                           


							</div>


						</div>

						<div
							class="card-footer d-flex justify-content-end align-items-center">
							<h6>Digite todos os campos. Campos com (*) são obrigatórios.</h6>

						</div>
					</form>
				</div>
				<!-- fim do card -->




			</div>

		</div>
		<!-- FIM DO CARD -->
        <script>
            
            document.addEventListener("DOMContentLoaded", function () {
                
                const select = document.getElementById('adolescenteSelect');
                
                if (!select) return;
                
                select.addEventListener('change', async function () {
                    
                    try {
                        
                        const id = this.value;
                        
                        if (!id) return;
                        
                        // 🔥 MOSTRA LOADING
                        mostrarLoading();
                        
                        console.log("Selecionado:", id);
                        
                        const response = await fetch('/adolescentes/buscaAdolescente/' + id);
                        
                        if (!response.ok) {
                            throw new Error("Erro ao buscar adolescente");
                        }
                        
                        const adolescente = await response.json();
                        
                        console.log(adolescente);
                        
                        const card = document.getElementById('cardAdolescente');
                        
                        if (card) {
                            card.classList.remove('d-none');
                        }
                        
                        const nome = document.getElementById('nomeAdolescente');
                        if (nome) nome.innerText = adolescente.nome || '-';
                        
                        const idade = document.getElementById('idadeAdolescente');
                        if (idade) idade.innerText = adolescente.idade || '-';
                        
                        const mae = document.getElementById('maeAdolescente');
                        if (mae) mae.innerText = adolescente.mae || '-';
                        
                        const cidade = document.getElementById('cidadeAdolescente');
                        
                        if (cidade) {
                            cidade.innerText =
                                    (adolescente.cidadeNascimento || '-') +
                                    '/' +
                                    (adolescente.ufNascimento || '-');
                        }
                        
                        const foto = document.getElementById('fotoAdolescente');
                        
                        if (foto) {
                            foto.src = adolescente.fotoRegistro || '/img/sem-foto.png';
                        }
                        
                    } catch (e) {
                        
                        console.error(e);
                        
                    } finally {
                        
                        // 🔥 ESCONDE LOADING
                        const overlay = document.getElementById("loadingOverlay");
                        
                        if (overlay) {
                            overlay.style.display = "none";
                        }
                        
                    }
                    
                });
                
            });
        
        </script>
	</div>
 
</body>
</html>
