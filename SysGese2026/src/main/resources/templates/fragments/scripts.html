	<script>
        function previewFoto3x4(input) {
            const placeholder = document.getElementById('fotoPlaceholder');
            const fotoExistente = document.getElementById('fotoExistente');
            const preview = document.getElementById('fotoPreview');
            const previewImg = document.getElementById('fotoPreviewImg');
            const previewNome = document.getElementById('fotoPreviewNome');

            if (input.files && input.files[0]) {
                const file = input.files[0];
                const reader = new FileReader();

                if (placeholder) placeholder.style.display = 'none';
                if (fotoExistente) fotoExistente.style.display = 'none';

                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewNome.textContent = file.name;
                    preview.style.display = 'block';
                };

                reader.readAsDataURL(file);
            }
        }
    </script>

	<script>
        let fotoIndex = 0;

        function addFoto() {

            const template = document.getElementById("fotoTemplate");

            let html = template.innerHTML.replaceAll("INDEX", fotoIndex);

                img.src = e.target.result;

         MÁSCARAS (CEP / TELEFONE)
    ========================== -->
	<script>
        document.addEventListener("input", function (e) {

            // CEP
            if (e.target.classList.contains("mask-cep")) {
                let value = e.target.value.replace(/\D/g, "");

                if (value.length > 2) value = value.replace(/^(\d{2})(\d)/, "$1.$2");
                if (value.length > 6) value = value.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2-$3");

                e.target.value = value.substring(0, 10);
            }

            // TELEFONE
            if (e.target.classList.contains("mask-phone")) {
                let value = e.target.value.replace(/\D/g, "");

                if (value.length > 10) {
                    value = value.replace(/^(\d{2})(\d{5})(\d)/, "($1) $2-$3");
                } else if (value.length > 6) {
                    value = value.replace(/^(\d{2})(\d{4})(\d)/, "($1) $2-$3");
                } else if (value.length > 2) {
                    value = value.replace(/^(\d{2})(\d)/, "($1) $2");
                }

                e.target.value = value.substring(0, 15);
            }

        });
    </script>

    ========================== -->
	<script>
        function buscarCep() {
            const cepInput = document.getElementById('cep');
            let cep = cepInput.value.replace(/\D/g, '');

            if (cep.length === 8) {
                fetch(`https://viacep.com.br/ws/${cep}/json/`)
                    .then(response => response.json())
                    .then(data => {
                        if (!data.erro) {
                            document.getElementById('logradouro').value = data.logradouro;
                            document.getElementById('bairro').value = data.bairro;
                            document.getElementById('cidade').value = data.localidade;

                            const ufSelect = document.getElementById('uf');
                            for (let i = 0; i < ufSelect.options.length; i++) {
                                if (ufSelect.options[i].value === data.uf) {
                                    ufSelect.selectedIndex = i;
                                    break;
                                }
                            }
                        } else {
                            alert('CEP não encontrado!');
                        }
                    })
                    .catch(() => alert('Erro ao buscar CEP'));
            } else {
                alert('CEP incompleto!');
            }
        }
    </script>

	<!-- =========================
         CPF (MÁSCARA + VALIDAÇÃO)
    ========================== -->
	<script>
function mascaraCPF(input) {
    let value = input.value.replace(/\D/g, '');

    value = value.substring(0, 11);

    value = value.replace(/(\d{3})(\d)/, '$1.$2');
    value = value.replace(/(\d{3})(\d)/, '$1.$2');
    value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

    input.value = value;

    validarCPF(input);
}

function validarCPF(input) {
    const cpf = input.value.replace(/\D/g, '');

    input.classList.remove('is-valid', 'is-invalid');

    if (cpf.length !== 11) {
        input.classList.add('is-invalid');
        return false;
    }

    if (/^(\d)\1+$/.test(cpf)) {
        input.classList.add('is-invalid');
        return false;
    }

    let soma = 0;
    let resto;

    // 1º dígito
    for (let i = 0; i < 9; i++) {
        soma += parseInt(cpf.charAt(i)) * (10 - i);
    }

    resto = (soma * 10) % 11;
    if (resto === 10) resto = 0;

    if (resto !== parseInt(cpf.charAt(9))) {
        input.classList.add('is-invalid');
        return false;
    }

    // 2º dígito
    soma = 0;
    for (let i = 0; i < 10; i++) {
        soma += parseInt(cpf.charAt(i)) * (11 - i);
    }

    resto = (soma * 10) % 11;
    if (resto === 10) resto = 0;

    if (resto !== parseInt(cpf.charAt(10))) {
        input.classList.add('is-invalid');
        return false;
    }

    // GARANTE QUE SÓ SALVA COM MÁSCARA COMPLETA (14)
    if (input.value.length !== 14) {
        input.classList.add('is-invalid');
        return false;
    }

    input.classList.add('is-valid');
    return true;
}
</script>

	<script>
function mascaraTelefone(input) {
    // Remove tudo que não for número
    let valor = input.value.replace(/\D/g, '');

    // Limita a 11 dígitos (DD + 9 + 8 números)
    if (valor.length > 11) valor = valor.slice(0,11);

    // Aplica a máscara
    if (valor.length <= 2) {
        valor = '(' + valor;
    } else if (valor.length <= 7) {
        valor = '(' + valor.slice(0,2) + ')' + valor.slice(2);
    } else {
        valor = '(' + valor.slice(0,2) + ')' + valor.slice(2,7) + '-' + valor.slice(7);
    }

    input.value = valor;
}

// Validação antes de enviar o formulário
document.querySelector('form').addEventListener('submit', function(e) {
    let camposTelefone = ['telefone1', 'telefone2', 'telefoneRecado'];
    let valido = true;
    let regexCelular = /^\(\d{2}\)\d{5}-\d{4}$/;

    camposTelefone.forEach(id => {
        let campo = document.getElementById(id);
        if (campo.value.trim() !== '' && !regexCelular.test(campo.value)) {
            campo.classList.add('is-invalid');
            valido = false;
        } else {
            campo.classList.remove('is-invalid');
        }
    });

    if (!valido) {
        e.preventDefault();
        alert('Preencha todos os telefones corretamente no formato (99)99999-9999');
    }
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const cpfInput = document.getElementById("cpf");

    if (!cpfInput) {
        console.log("Campo CPF não encontrado");
        return;
    }

    cpfInput.addEventListener("blur", function () {

        console.log("DISPAROU"); // 🔥 teste

        let cpf = this.value;

        if (cpf.length < 14) return;

        fetch(`/adolescentes/verificar-cpf?cpf=${cpf}`)
            .then(res => res.json())
            .then(data => {

                console.log(data); // 🔥 debug

                if (!data.existe) return;

                if (data.internacaoAtiva) {
                    alert(`⚠️ Adolescente já cadastrado (ID: ${data.id})
Está INTERNADO atualmente.
Você NÃO pode alterar ou internar novamente.`);
                    return;
                }

                let editar = confirm(
                    `⚠️ Adolescente já existe!\n\n` +
                    `Nome: ${data.nome}\n` +
                    `ID: ${data.id}\n\n` +
                    `Deseja editar o cadastro?`
                );

                if (editar) {
                    window.location.href = `/adolescentes/editar/${data.id}`;
                }

            })
            .catch(err => console.error("Erro:", err));

    });

});
</script>
