<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/base}">

<head>
<title>Adolescentes</title>
</head>

<body>
	<div layout:fragment="content">


		<div class="container-fluid p-2">
			<div class="row">
				<div class="col-12">
					<nav aria-label="breadcrumb card"
						style="margin-top: -25px; font-size: 0.8rem;">
						<ol class="breadcrumb">
							<li class="breadcrumb-item"><a th:href="@{/home}"> <i
									class="fa-duotone fa-solid fa-house fs-7"></i> Home
							</a></li>
							<li class="breadcrumb-item"><span class="text-muted">
									<i class="fa-solid fa-child"></i> Adolescente
							</span></li>

						</ol>
					</nav>
				</div>
			<div class="col-12">
					<!-- Mensagens de erro e de ok -->
					<div th:if="${msgOk}"
						class="alert alert-success alert-dismissible fade show auto-close"
						role="alert" id="successAlert">
						<i class="fa-duotone fa-solid fa-thumbs-up me-2"></i> <span
							th:text="${msgOk}"></span>
						<button type="button" class="btn-close" data-bs-dismiss="alert"
							aria-label="Close"></button>
					</div>

					<!-- Mensagem de Erro -->
					<div th:if="${msgErro}"
						class="alert alert-danger alert-dismissible fade show auto-close"
						role="alert" id="errorAlert">
						<i class="fa-duotone fa-solid fa-triangle-exclamation me-2"></i> <span
							th:text="${msgErro}"></span>
						<button type="button" class="btn-close" data-bs-dismiss="alert"
							aria-label="Close"></button>
					</div>
				</div>
				<div class="col-12">
					<div class="card">
						<div
							class="card-header d-flex justify-content-between align-items-center fs-5 fw-semibold text-uppercase">

							<h5 class="mb-0 text-secondary">Adolescentes</h5>
							<a th:href="${isMaster} ? @{/adolescente/novo} : '#'"
								class="btn btn-outline-sistema"
								th:classappend="${!isMaster} ? ' disabled opacity-50'"
								data-bs-toggle="tooltip"
								th:title="${isMaster} ? 'Novo Adolescente' : 'Sem Permissão para incluir novo Adolescente'">
								<i class="fa-duotone fa-plus"></i> Novo
							</a>

						</div>
						<div class="card-body">
							<div class="row">
								<div class="col-12">
									<form th:action="@{/adolescentes}" method="get" class="mb-3">
										<input type="hidden" name="unidadeId" th:value="${unidadeId}">
										<div class="row g-2">
											<div class="col-md-6 input-group-sm">
												<label class="form-label fw-semibold">Nome do
													Adolescente</label> <input type="text" name="nome"
													th:value="${nomeBusca}" class="form-control"
													placeholder="Digite para buscar">
											</div>

											<div class="col-md-4 input-group-sm">
												<label class="form-label fw-semibold">Apelido do
													Adolescente</label> <input type="text" name="apelido"
													th:value="${abelidoBusca}" class="form-control"
													placeholder="Digite para buscar">
											</div>

											<div class="col-md-2 input-group-sm">
												<label class="form-label fw-semibold">Cidade do
													Adolescente</label> <input type="text" name="cidade"
													th:value="${cidadeBusca}" class="form-control"
													placeholder="Digite para buscar">
											</div>


										</div>

										<div class="row g-2 mt-1">
											<div class="col-md-2 input-group-sm">
												<label class="form-label fw-semibold">CPF do
													Adolescente</label> <input type="text" name="cpf"
													th:value="${cpfBusca}" class="form-control"
													placeholder="Digite para buscar">
											</div>

											<div class="col-md-2 input-group-sm">
												<label class="form-label fw-semibold">Idade Mínima</label> <input
													type="number" name="idadeMin" th:value="${idadeMin}"
													class="form-control" placeholder="Digite para buscar">
											</div>

											<div class="col-md-2 input-group-sm">
												<label class="form-label fw-semibold">Idade Máxima</label> <input
													type="number" name="idadeMax" th:value="${idadeMax}"
													class="form-control" placeholder="Digite para buscar">
											</div>



											<div class="col-md-1 input-group-sm">
												<label class="form-label fw-semibold">Status</label> <select
													name="status" class="form-select">
													<option value="ativos"
														th:selected="${statusFiltro == 'ativos'}">Ativos</option>
													<option value="inativos"
														th:selected="${statusFiltro == 'inativos'}">Inativos</option>
													<option value="todos"
														th:selected="${statusFiltro == 'todos'}">Todos</option>
												</select>
											</div>

											<div class="col-md-1 input-group-sm">
												<label class="form-label fw-semibold">Linhas</label> <select
													name="tamanho" class="form-select">
													<option value="10" th:selected="${tamanhoPagina == 10}">10</option>
													<option value="15" th:selected="${tamanhoPagina == 15}">15</option>
													<option value="20" th:selected="${tamanhoPagina == 20}">20</option>
													<option value="25" th:selected="${tamanhoPagina == 25}">25</option>
													<option value="30" th:selected="${tamanhoPagina == 30}">30</option>
												</select>
											</div>
											<div class="col-md-3 input-group-sm" th:if="${isMaster}">
												<label class="form-label fw-semibold">Unidade</label> <select
													name="unidadeId" class="form-select">
													<option value="">Todas</option>

													<option th:each="u : ${unidades}" th:value="${u.id}"
														th:text="${u.nome}" th:selected="${u.id == unidadeId}">
													</option>
												</select>
											</div>
											<div class="col-md-3 input-group-sm" th:if="${!isMaster}">
												<label class="form-label fw-semibold">Unidade</label> <input
													type="text" class="form-control"
													th:value="${lotacaoUsuarioLogado.unidade.nome}" disabled>
											</div>

											<div class="col-md-1 d-flex align-items-end input-group-sm">
												<button type="submit" class="btn btn-outline-sistema w-100"
													data-bs-toggle="tooltip" title="Aplicar Filtros">
													<i class="fa-solid fa-magnifying-glass"></i> Buscar
												</button>
											</div>

										</div>
									</form>




								</div>
								<div class="col-12">
									<table class="table table-striped table-bordered align-middle">
										<thead class="table-dark"
											style="--bs-table-bg: #0c174a; --bs-table-border-color: #0e2583;">
											<tr>
												<th>Foto</th>
												<th>Dados</th>
												<th>Cidade <small>(residência)</small></th>
												<th>Bairro <small>(residência)</small></th>
												<th>UF <small>(residência)</small></th>
												<th>Unidade Cadastro</th>
												<th class="text-center" style="width: 120px;">Status</th>
												<th class="text-center" style="width: 140px;">Ações</th>
											</tr>
										</thead>
										<tbody>
											<tr th:each="adolescente : ${adolescentes}">

												<td><img th:if="${adolescente.fotoRegistro != null}"
													th:src="${adolescente.fotoRegistro}" class="foto-tabela">
													<img th:if="${adolescente.fotoRegistro == null}"
													src="/img/sem-foto.png" class="foto-tabela"></td>




												<td>
													<div class="fw-semibold" th:text="${adolescente.nome}"></div>

													<small class="text-muted d-block"> Natural: <span
														th:text="${adolescente.cidadeNascimento}"></span> / <span
														th:text="${adolescente.ufNascimento}"></span> • <span
														th:text="${adolescente.idade}"></span> anos
												</small> <small class="text-muted d-block"> Mãe: <span
														th:text="${adolescente.mae}"></span>
												</small>
												</td>
											
												<td th:text="${adolescente.enderecoAtual?.cidade}"></td>
												<td th:text="${adolescente.enderecoAtual?.bairro}"></td>
												<td th:text="${adolescente.enderecoAtual?.uf}"></td>
											
												<td th:text="${adolescente.nomeUnidadeCadastro}"></td>



												<td class="text-center"><span
													th:if="${adolescente.status == 1}"
													class="badge bg-success-subtle text-success fw-semibold px-3 py-2">
														Ativo </span> <span th:if="${adolescente.status == 0}"
													class="badge bg-danger-subtle text-danger fw-semibold px-3 py-2">
														Inativo </span></td>

												<td class="text-center text-nowrap"><a
													th:href="@{/adolescente/{id}(id=${adolescente.id})}"
													class="btn btn-outline-sistema btn-sm px-2"
													data-bs-toggle="tooltip" title="Detalhes"> <i
														class="fa-duotone fa-eye"></i>
												</a> <a
													th:href="${isMaster} ? @{/adolescente/editar/{id}(id=${adolescente.id})} : '#'"
													th:classappend="${!isMaster} ? ' disabled opacity-50'"
													class="btn btn-outline-sistema btn-sm px-2"
													data-bs-toggle="tooltip" title="Editar"> <i
														class="fa-duotone fa-pen-to-square"></i>
												</a> <a
													th:href="${isMaster} ? @{/adolescente/excluir/{id}(id=${adolescente.id})} : '#'"
													th:classappend="${!isMaster} ? ' disabled opacity-50'"
													class="btn btn-outline-sistema btn-sm px-2"
													data-bs-toggle="tooltip" title="Excluir"
													onclick="return confirm('Deseja excluir essa Função?');">
														<i class="fa-duotone fa-trash"></i>
												</a></td>
											</tr>
										</tbody>
									</table>


								</div>
							</div>

						</div>
						<div class="card-footer d-flex justify-content-end">

							<nav aria-label="Paginação">
								<ul class="pagination mb-0">

									<!-- Anterior -->
									<li class="page-item"
										th:classappend="${paginaAtual == 0} ? 'disabled'"><a
										class="page-link"
										th:href="@{/adolescente(pagina=${paginaAtual - 1}, nome=${nomeBusca}, apelido=${apelidoBusca}, cidade=${cidadeBusca}, cpf=${cpfBusca}, idadeMin=${idadeMin}, idadeMax=${idadeMax},   status=${statusFiltro}, tamanho=${tamanhoPagina})}">
											Anterior </a></li>

									<!-- Números -->
									<li th:each="i : ${#numbers.sequence(0, totalPaginas-1)}"
										class="page-item"
										th:classappend="${i == paginaAtual} ? 'active'"><a
										class="page-link"
										th:href="@{/adolescente(pagina=${i}, nome=${nomeBusca}, apelido=${apelidoBusca}, cidade=${cidadeBusca}, cpf=${cpfBusca}, idadeMin=${idadeMin}, idadeMax=${idadeMax}, status=${statusFiltro}, tamanho=${tamanhoPagina})}"
										th:text="${i + 1}"> </a></li>

									<!-- Próxima -->
									<li class="page-item"
										th:classappend="${paginaAtual + 1 >= totalPaginas} ? 'disabled'">
										<a class="page-link"
										th:href="@{/adolescente(pagina=${paginaAtual + 1}, nome=${nomeBusca}, apelido=${apelidoBusca}, cidade=${cidadeBusca}, cpf=${cpfBusca}, idadeMin=${idadeMin}, idadeMax=${idadeMax}, status=${statusFiltro}, tamanho=${tamanhoPagina})}">
											Próxima </a>
									</li>

								</ul>
							</nav>

						</div>

					</div>
				</div>

			</div>

		</div>

	</div>
</body>
</html>
